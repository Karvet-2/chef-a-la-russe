# Продакшен с внешней managed PostgreSQL (Timeweb и т.п.).
# Скопируйте .env.production.example в корень как .env.production и заполните.
# Запуск из корня: npm run docker:prod:up

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: chef-championship-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # Явный путь к загрузкам в контейнере (совпадает с volume ./uploads:/repo/uploads)
      UPLOADS_ROOT: /repo/uploads
      # Пока включено: утилиты Tailwind в браузере, если прод-сборка CSS пустая. Отключить: TAILWIND_PLAY_CDN=0
      TAILWIND_PLAY_CDN: "1"
    volumes:
      - ./uploads:/repo/uploads
