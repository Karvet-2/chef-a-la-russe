# Nginx для chef-a-la-russe.ru
# На VPS: скопировать в sites-available и включить сайт (см. deploy/DEPLOY.md §6).

server {
    listen 80;
    server_name chef-a-la-russe.ru www.chef-a-la-russe.ru;
    client_max_body_size 50M;

    # Хэшированные CSS/JS — кэшировать можно (имена меняются при каждой сборке)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 75s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Страницы HTML: не годовой кэш (иначе после деплоя браузер держит старый HTML со старыми ссылками на чанки)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 75s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-cache, must-revalidate" always;
    }
}
