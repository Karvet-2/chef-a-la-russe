# Полный пример: HTTP → редирект на HTTPS + прокси на Next (порт 3000).
# После certbot пути к сертификатам уже есть — сравни с:
#   sudo ls /etc/letsencrypt/live/
# Если имя каталога другое — поправь ssl_certificate и ssl_certificate_key ниже.
#
# Установка:
#   sudo cp deploy/nginx.chef-a-la-russe.ru.https.conf /etc/nginx/sites-available/chef.conf
#   sudo ln -sf /etc/nginx/sites-available/chef.conf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# Редирект с 80 на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name chef-a-la-russe.ru www.chef-a-la-russe.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chef-a-la-russe.ru www.chef-a-la-russe.ru;

    client_max_body_size 50M;

    ssl_certificate     /etc/letsencrypt/live/chef-a-la-russe.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chef-a-la-russe.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Статика Next (CSS/JS с хэшем) — обязательно те же заголовки, что и для HTML
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 75s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Страницы и API
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 75s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, no-cache, must-revalidate" always;
    }
}
