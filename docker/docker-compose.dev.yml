version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chef-championship-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chef_championship
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chef-championship-network

  prisma-studio:
    image: node:20-alpine
    container_name: chef-championship-prisma-studio-dev
    working_dir: /repo
    volumes:
      - ..:/repo
      - /repo/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chef_championship?schema=public
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chef-championship-network
    command: sh -c "npm install && npx prisma generate && npx prisma studio --hostname 0.0.0.0 --schema backend/prisma/schema.prisma"

volumes:
  postgres_data_dev:
    driver: local

networks:
  chef-championship-network:
    driver: bridge
